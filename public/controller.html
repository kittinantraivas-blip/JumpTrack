<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Controller</title>
        <link rel="icon" type="image/x-icon" href="/img/logonew.ico" />
        <link rel="stylesheet" href="css/controller.css" />
        <script src="js/controller.js" defer></script>
        <script src="/socket.io/socket.io.js"></script>
    </head>
    <body>
        <nav>
            <img src="img/Untitled design.svg" alt="Logo" />
            <div>
                <a
                    href="https://www.aahhtechlab.com/"
                    target="_blank"
                    id="medium-link"
                >
                    <span>About</span>
                    <img src="img/Untitled design.svg" alt="Medium" />
                </a>
            </div>
            <div id="connection-status" class="connecting"></div>
        </nav>
        <main>
            <img src="img/phone2.svg" alt="Phone" />
        </main>

        <div id="enable-container">
            <button id="enable-btn">Enable Jump Detection</button>
        </div>

        <div
            id="debug-overlay"
            style="
                position: fixed;
                bottom: 8px;
                left: 8px;
                z-index: 9999;
                font-family: monospace;
                font-size: 14px;
                line-height: 1.5;
                color: #0f0;
                background: rgba(0, 0, 0, 0.75);
                padding: 8px 12px;
                border-radius: 8px;
                pointer-events: none;
            "
        >
            waiting for motion…
        </div>
    </body>
</html>
